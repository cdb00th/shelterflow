version: 2

models:
  - name: gold_adoption_metrics
    description: >
      One row per (animal_type, breed_standardized) segment: For each,
      adoption metrics (adoption_rate, avg_days_to_adoption) are calculated
      based on shelter stays that ended in adoption. 
      These metrics are calculated for dogs and cats only, as adoption is
      the relevant lens for these specific animal types, and they are the only types
      breed_standardized normalizes.
      The outcome of "Rto-Adopt" (return to owner, followed by adoption) counts
      as a non-adoption.
      Breeds with fewer than 10 completed stays are dropped to keep rates from
      being dominated by tiny-sample noise.
    columns:
      - name: animal_type
        description: Dog or Cat
      - name: breed_standardized
        description: "{{ doc('breed_standardized') }}"
      - name: total_stays
        description: All completed stays in the segment (intakes with no recorded outcome are excluded upstream).
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: adoptions
        description: Count of stays ending in adoption.
      - name: adoption_rate
        description: >
          Share of completed stays in the segment that ended in adoption (adoptions/total_stays).
          Rto-Adopt is treated as a non-adoption (counted in the denominator, not as an adoption).
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1
      - name: avg_days_to_adoption
        description: Average length of stay for adopted animals only; NULL when a segment had no adoptions.

  - name: gold_long_stay_animals
    description: >
      One row per completed stay that met the long-stay threshold: A long-stay
      is defined as being in the 95th percentile of the completed-stay length
      (70 days) in this dataset (i.e. the longest ~5% of stays).
      These are historical, not currently-in-shelter stays that ENDED after
      70+ days. The dataset ends in 2018, so a point-in-time "still present"
      view isn't meaningful.
    columns:
      - name: animal_id
        description: "{{ doc('animal_id') }}"          
      - name: animal_type
        description: Dog or Cat                            
      - name: breed_standardized
        description: "{{ doc('breed_standardized') }}"  
      - name: age_group
        description: "{{ doc('age_group')}}"   
      - name: intake_date
        description: "{{ doc('intake_date') }}"
      - name: outcome_date
        description: "{{ doc('outcome_date') }}"                           
      - name: outcome_type
        description: "{{ doc('outcome_type') }}"     
      - name: length_of_stay
        description: "{{ doc('length_of_stay') }}"      
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 70

  - name: gold_capacity_trends
    description: >
      Monthly shelter capacity trends: intake/outcome volume and net population
      flow. Grain is one row per calendar month (month start). Reads from
      silver_intakes/silver_outcomes directly rather than int_animal_stays;
      Capacity reflects physical movement through the shelter, so every event is
      counted independently rather than matched into stays. The month series is
      gap-free (verified: distinct-month count equals the expected count across
      the full date range), so the running total never steps across missing time.
    columns:
      - name: month
        description: Calendar month, truncated to month start.
        tests:
          - unique
          - not_null
      - name: intakes
        description: Count of intake events recorded in the month.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: outcomes
        description: Count of outcome events recorded in the month.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: net_flow
        description: >
          Net monthly population change, intakes minus outcomes. Positive means
          the shelter grew that month; negative means it shrank.
        tests:
          - not_null
      - name: cumulative_net_population
        description: >
          Running sum of net_flow ordered by month. Measures cumulative change
          since the start of data collection, NOT true shelter headcount; The
          source has no starting census, so read this as a relative trend, not a
          literal count.
        tests:
          - not_null